log_format oxidian_sanitized '$remote_addr - $remote_user [$time_local] '
                             '"$request_method $uri $server_protocol" $status $body_bytes_sent '
                             '"$http_referer" "$http_user_agent" "$http_x_forwarded_for"';

# Cloudflare Tunnel conecta por HTTP dentro de Docker, pero conserva el
# protocolo público en X-Forwarded-Proto. Solo usamos $scheme como fallback
# para accesos LAN directos que no traen esa cabecera.
map $http_x_forwarded_proto $oxidian_forwarded_proto {
    default $http_x_forwarded_proto;
    ""      $scheme;
}

upstream oxidian_web {
    server oxidian:5000;
}

upstream evolution_api {
    server evolution-api:8080;
}

server {
    listen 80;
    server_name _;
    access_log /var/log/nginx/access.log oxidian_sanitized;
    client_max_body_size 10m;
    keepalive_timeout 65s;
    send_timeout 120s;
    gzip on;
    gzip_comp_level 5;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript application/manifest+json image/svg+xml;

    # ── Cabeceras de seguridad ─────────────────────────────────────────
    # X-Frame-Options, X-Content-Type-Options, Referrer-Policy, Permissions-
    # Policy y CSP los emite la propia aplicación Flask (extensions.py). Los
    # mantenemos como fuente única ahí; nginx no los duplica.
    #
    # HSTS solo tiene sentido cuando el dominio sirve HTTPS. En producción
    # Cosmos termina TLS al nivel de su reverse-proxy, así que descomenta esta
    # línea SOLO una vez confirmado que el dominio público responde por HTTPS.
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $oxidian_forwarded_proto;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_read_timeout 120s;
    proxy_send_timeout 120s;
    proxy_connect_timeout 10s;
    proxy_buffering on;
    proxy_buffers 16 16k;
    proxy_busy_buffers_size 32k;

    location = /gateway-health {
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    location /static/ {
        proxy_pass http://oxidian_web;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
    }

    location /uploads/ {
        proxy_pass http://oxidian_web;
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
    }

    # Webhook público de Evolution hacia el bot, sin exponer el puerto 3000.
    location = /webhook/evolution {
        proxy_pass http://oxidian_web/webhook/evolution;
    }

    # No se expone panel/API del bot ni Evolution Manager:
    # toda configuración vive en /superadmin/chatbot dentro de Oxidian.
    location ~ ^/(bot|bot-api|manager|instance|message|chat|group|settings|socket\.io)(/|$) {
        return 404;
    }

    # API interna Flask ↔ chatbot. Nunca debe quedar expuesta por el gateway.
    location ^~ /api/bot/ {
        return 404;
    }

    # Oxidian es la aplicación principal del dominio.
    location / {
        proxy_pass http://oxidian_web;
    }
}
