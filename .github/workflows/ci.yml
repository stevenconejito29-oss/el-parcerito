name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U test -d test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: oxidian/requirements.txt

      - name: Install Python dependencies
        run: pip install -r oxidian/requirements.txt

      - name: Compile Python sources
        run: python -m compileall -q oxidian

      - name: Test authentication boundary
        working-directory: oxidian
        env:
          DATABASE_URL: postgresql://test:test@127.0.0.1:5432/test
        run: python -m unittest discover -s tests -p "test_*.py"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: chat/package-lock.json

      - name: Install chatbot dependencies
        working-directory: chat
        run: npm ci --no-audit --no-fund

      - name: Test chatbot
        working-directory: chat
        run: npm test

      - name: Validate production Compose
        run: >-
          docker compose
          --env-file oxidian/.env.cosmos.example
          -f oxidian/cosmos-compose.yml
          config --quiet
