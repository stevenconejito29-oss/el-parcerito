name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Compile Python sources
        run: python -m compileall -q oxidian

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: chat/package-lock.json

      - name: Install chatbot dependencies
        working-directory: chat
        run: npm ci --no-audit --no-fund

      - name: Test chatbot
        working-directory: chat
        run: npm test

      - name: Validate production Compose
        run: >-
          docker compose
          --env-file oxidian/.env.cosmos.example
          -f oxidian/cosmos-compose.yml
          config --quiet
